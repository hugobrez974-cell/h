<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Connexion Admin</title>
  <style>
    body { font-family:sans-serif; background:#f4e9d8; padding:2rem; }
    form { max-width:300px; margin:auto; background:white; padding:2rem; border-radius:1rem; }
    input { width:100%; padding:0.6rem; margin-top:1rem; }
    button { margin-top:1rem; padding:0.6rem 1rem; background:#a7c4a0; border:none; border-radius:0.5rem; cursor:pointer; }
  </style>
</head>
<body>

<form onsubmit="login(event)">
  <h2>Admin</h2>
  <input type="password" id="pass" placeholder="Mot de passe">
  <button type="submit">Entrer</button>
</form>

<script>
function login(e){
  e.preventDefault();
  if (pass.value === "Test1234") {
    localStorage.setItem("admin", "ok");
    window.location.href = "admin.html";
  } else {
    alert("Mot de passe incorrect");
  }
}
</script>

</body>
</html>
