<h1>📋 Administration – Les Tonneaux des Ô</h1>

<h2>Créer une pré-réservation (bloquer les dates)</h2>
<div class="form-container">
  <label>Bungalow :</label><br>
  <select id="bungalow">
    <option value="1">Bungalow 1</option>
    <option value="2">Bungalow 2</option>
    <option value="3">Bungalow 3</option>
  </select><br>

  <label>Nom :</label><br>
  <input id="name" type="text"><br>

  <label>Email :</label><br>
  <input id="email" type="email"><br>

  <label>Date arrivée :</label><br>
  <input id="dateArrivee" type="date"><br>

  <label>Date départ :</label><br>
  <input id="dateDepart" type="date"><br>

  <label>Prix total (€) :</label><br>
  <input id="price" type="number" readonly><br><br>

  <button onclick="createReservation()" style="padding:10px 20px;background:#A7C4A0;border:none;border-radius:8px;font-weight:700;">
    ➕ Bloquer les dates (pré-réservation)
  </button>
</div>

<h2>Réservations</h2>
<table id="table">
  <thead>
    <tr>
      <th>#</th>
      <th>Bungalow</th>
      <th>Nom</th>
      <th>Email</th>
      <th>Arrivée</th>
      <th>Départ</th>
      <th>Prix</th>
      <th>Status</th>
      <th>Lien paiement</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const BASE_URL = "https://h-e5oa.onrender.com";

// 🔥 TARIFS : 130€ dim-jeu, 150€ ven-sam
function getNightPrice(date) {
  const d = new Date(date);
  const day = d.getDay();
  if (day === 5 || day === 6) return 150;
  return 130;
}

function updatePriceForm() {
  const dateA = document.getElementById("dateArrivee").value;
  const dateD = document.getElementById("dateDepart").value;
  if (!dateA || !dateD) return;

  const d1 = new Date(dateA);
  const d2 = new Date(dateD);
  const nights = (d2 - d1) / (1000 * 60 * 60 * 24);
  if (nights <= 0) {
    document.getElementById("price").value = "";
    return;
  }

  let total = 0;
  let current = new Date(dateA);
  for (let i = 0; i < nights; i++) {
    total += getNightPrice(current);
    current.setDate(current.getDate() + 1);
  }
  document.getElementById("price").value = total;
}

document.getElementById("dateArrivee").addEventListener("change", updatePriceForm);
document.getElementById("dateDepart").addEventListener("change", updatePriceForm);

// 🔥 Charger les réservations
async function loadReservations() {
  const res = await fetch(`${BASE_URL}/api/reservations`);
  const data = await res.json();

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.forEach((r, index) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${index}</td>
      <td>${r.bungalow || ""}</td>
      <td>${r.name || ""}</td>
      <td>${r.email || ""}</td>
      <td>${r.dateArrivee || ""}</td>
      <td>${r.dateDepart || ""}</td>
      <td>${r.price ? r.price + " €" : ""}</td>
      <td>${r.status || ""}</td>
      <td>${r.paymentLink ? '<a href="' + r.paymentLink + '" target="_blank">Lien</a>' : ''}</td>
      <td>
        <button class="invoice" onclick="downloadInvoice(${index})">📄 Facture</button>
        <button class="paylink" onclick="createPaymentLink(${index})">💳 Lien paiement</button>
        <button class="send" onclick="sendPaymentLink(${index})">📨 Envoyer lien</button>
        <button class="delete" onclick="deleteReservation(${index})">🗑 Supprimer</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// 🔥 Créer une pré-réservation (bloque les dates)
async function createReservation() {
  const bungalow = document.getElementById("bungalow").value;
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const dateArrivee = document.getElementById("dateArrivee").value;
  const dateDepart = document.getElementById("dateDepart").value;
  const price = document.getElementById("price").value;

  if (!bungalow || !name || !email || !dateArrivee || !dateDepart || !price) {
    alert("Champs manquants");
    return;
  }

  const res = await fetch(`${BASE_URL}/api/reservations`);
  const data = await res.json();

  const overlap = data.some(r =>
    r.bungalow == bungalow &&
    !(dateDepart <= r.dateArrivee || dateArrivee >= r.dateDepart)
  );

  if (overlap) {
    alert("Ce bungalow est déjà occupé sur ces dates.");
    return;
  }

  const res2 = await fetch(`${BASE_URL}/api/admin/create`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ bungalow, name, email, dateArrivee, dateDepart, price })
  });

  const json = await res2.json();

  if (json.success) {
    alert("Pré-réservation créée (dates bloquées).");
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("dateArrivee").value = "";
    document.getElementById("dateDepart").value = "";
    document.getElementById("price").value = "";
    loadReservations();
  } else {
    alert("Erreur : " + json.error);
  }
}

// 🔥 Générer un lien de paiement Stripe pour une résa
async function createPaymentLink(index) {
  const res = await fetch(`${BASE_URL}/api/reservations`);
  const data = await res.json();
  const r = data[index];

  if (!r) {
    alert("Réservation introuvable");
    return;
  }

  const response = await fetch(`${BASE_URL}/api/admin/create-payment-link`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      ...r,
      index
    })
  });

  const json = await response.json();

  if (json.success) {
    alert("Lien généré et copié : " + json.url);
    if (navigator.clipboard) {
      navigator.clipboard.writeText(json.url);
    }
    loadReservations();
  } else {
    alert("Erreur : " + json.error);
  }
}

// 🔥 Envoyer le lien de paiement au client (mailto)
async function sendPaymentLink(index) {
  const res = await fetch(`${BASE_URL}/api/reservations`);
  const data = await res.json();
  const r = data[index];

  if (!r || !r.paymentLink) {
    alert("Aucun lien de paiement pour cette réservation.");
    return;
  }

  const invoiceUrl = `${BASE_URL}/api/admin/invoice/${index}`;

  const message = `Bonjour ${r.name},

Voici votre lien de paiement pour votre réservation aux Tonneaux des Ô :

➡ Paiement sécurisé : ${r.paymentLink}

📄 Facture : NON PAYÉE
Télécharger la facture PDF : ${invoiceUrl}

Détails de votre réservation :
- Bungalow : ${r.bungalow}
- Arrivée : ${r.dateArrivee}
- Départ : ${r.dateDepart}
- Montant : ${r.price} €

Nous restons disponibles pour toute question.
À très bientôt au Tonneaux des Ô.`;

  const url = `mailto:${r.email}?subject=Votre réservation aux Tonneaux des Ô&body=${encodeURIComponent(message)}`;
  window.location.href = url;
}

// 🔥 Télécharger une facture PDF admin
function downloadInvoice(id) {
  window.location.href = `${BASE_URL}/api/admin/invoice/${id}`;
}

// 🔥 Supprimer une réservation
async function deleteReservation(id) {
  if (!confirm("Supprimer cette réservation ?")) return;

  const res = await fetch(`${BASE_URL}/api/reservations`);
  const data = await res.json();

  data.splice(id, 1);

  await fetch(`${BASE_URL}/api/reservations`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  loadReservations();
}

loadReservations();
</script>
