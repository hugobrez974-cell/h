<!DOCTYPE html>
<html lang="fr">
    <script>
if (localStorage.getItem("admin") !== "ok") {
  window.location.href = "admin-login.html";
}
</script>
<head>
  <meta charset="UTF-8">
  <title>Admin – Réservations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:system-ui, sans-serif;padding:2rem;background:#f5f5f5;}
    h1{margin-bottom:1rem;}
    table{border-collapse:collapse;width:100%;background:white;}
    th,td{border:1px solid #ddd;padding:8px;font-size:14px;}
    th{background:#eee;}
    tr:nth-child(even){background:#fafafa;}
    .btn-retour {
  display:inline-block;
  padding:0.6rem 1.2rem;
  background:var(--vert);
  color:var(--bois);
  border:none;
  border-radius:999px;
  font-weight:600;
  cursor:pointer;
  margin-bottom:1rem;
}
      .btn-delete {
  background: #8b3a3a;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.btn-delete:hover {
  background: #6d2d2d;
}
.btn-retour:hover {
  background:#8fb48a;
}
      async function deleteResa(id) {
  if (!confirm("Supprimer cette réservation ?")) return;

  const res = await fetch("/api/delete-reservation", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id })
  });

  const data = await res.json();

  if (data.success) {
    alert("Réservation supprimée");
    loadReservations(); // recharge la liste
  } else {
    alert("Erreur lors de la suppression");
  }
}
  </style>
</head>
<body>
    <a href="main.html" class="btn-retour">← Retour</a>

<h1>Réservations</h1>

<table id="resa-table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Email</th>
      <th>Bungalow</th>
      <th>Début</th>
      <th>Fin</th>
      <th>Créé le</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadResa(){
  const res = await fetch("/api/reservations");
  const data = await res.json();
  const tbody = document.querySelector("#resa-table tbody");
  tbody.innerHTML = "";
  data.forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML = `
      <td>${r.id}</td>
      <td>${r.nom}</td>
      <td>${r.email}</td>
      <td>${r.bungalow}</td>
      <td>${r.debut}</td>
      <td>${r.fin}</td>
      <td>${r.created_at}</td>
      <button class="btn-delete" onclick="deleteResa(${r.id})">Supprimer</button>
    `;
    tbody.appendChild(tr);
  });
}
loadResa();
</script>

</body>
</html>
