<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin – Les tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: sans-serif;
      background: #f4e9d8;
      color: #3A2F25;
      padding: 2rem;
    }
    .box {
      max-width: 400px;
      margin: auto;
      background: #fff;
      padding: 2rem;
      border-radius: 1rem;
      border: 2px solid #5A4633;
    }
    input, button {
      width: 100%;
      padding: 0.8rem;
      margin-top: 1rem;
      border-radius: 0.6rem;
      border: 2px solid #5A4633;
    }
    button {
      background: #A7C4A0;
      font-weight: 700;
      cursor: pointer;
    }
    #admin-panel {
      display: none;
      margin-top: 2rem;
    }
    .error {
      color: red;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>

<body>

<h1>Admin</h1>

<div class="box" id="login-box">
  <label>Mot de passe admin</label>
  <input type="password" id="password">
  <button onclick="login()">Connexion</button>
  <div id="error" class="error"></div>
</div>

<div id="admin-panel">
  <h2>Panneau d'administration</h2>

  <button onclick="chargerReservations()">Voir les réservations</button>
  <div id="reservations"></div>

  <h3>Bloquer une date</h3>
  <label>Bungalow</label>
  <select id="bungalow">
    <option value="bungalow1">Bungalow 1</option>
    <option value="bungalow2">Bungalow 2</option>
  </select>

  <label>Date à bloquer</label>
  <input type="date" id="dateBlock">

  <button onclick="bloquerDate()">Bloquer</button>

  <div id="block-result"></div>
</div>

<script>
const ADMIN_PASSWORD = "1234"; // change ici

function login() {
  const pass = document.getElementById("password").value;
  if (pass !== ADMIN_PASSWORD) {
    document.getElementById("error").textContent = "Mot de passe incorrect";
    document.getElementById("error").style.display = "block";
    return;
  }

  document.getElementById("login-box").style.display = "none";
  document.getElementById("admin-panel").style.display = "block";
}

// Charger les réservations
async function chargerReservations() {
  const res = await fetch("https://h-e5oa.onrender.com/api/reservations");
  const data = await res.json();

  let html = "<ul>";
  data.forEach(r => {
    html += `<li>${r.bungalow} — ${r.dateArrivee} → ${r.dateDepart} — ${r.name}</li>`;
  });
  html += "</ul>";

  document.getElementById("reservations").innerHTML = html;
}

// Bloquer une date
async function bloquerDate() {
  const bungalow = document.getElementById("bungalow").value;
  const date = document.getElementById("dateBlock").value;

  const res = await fetch("https://h-e5oa.onrender.com/api/block-date", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ bungalow, date })
  });

  const json = await res.json();
  document.getElementById("block-result").textContent = json.message;
}
</script>

</body>
</html>
