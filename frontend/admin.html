<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
</head>
<body>

<h1>Admin</h1>

<input type="password" id="password" placeholder="Mot de passe admin">
<button onclick="login()">Connexion</button>

<div id="adminPanel" style="display:none;">
  <h2>Réservations</h2>
  <table id="resaTable" border="1"></table>
</div>

<script>
async function login() {
  const password = document.getElementById("password").value;

  const res = await fetch("https://h-e5oa.onrender.com/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password })
  });

  const json = await res.json();

  if (!json.success) {
    alert("Mot de passe incorrect");
    return;
  }

  document.getElementById("adminPanel").style.display = "block";
  loadReservations();
}

async function loadReservations() {
  const res = await fetch("https://h-e5oa.onrender.com/admin/reservations");
  const data = await res.json();

  const table = document.getElementById("resaTable");
  table.innerHTML = "<tr><th>ID</th><th>Date</th><th>Nom</th><th>Email</th><th>Nuits</th><th>Prix</th></tr>";

  data.forEach(r => {
    table.innerHTML += `
      <tr>
        <td>${r.id}</td>
        <td>${r.date}</td>
        <td>${r.name}</td>
        <td>${r.email}</td>
        <td>${r.nights}</td>
        <td>${r.price}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
