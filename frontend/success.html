<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paiement réussi – Les Tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #F4E9D8;
      color: #3A2F25;
      text-align: center;
      padding: 3rem 1rem;
    }

    .box {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      border: 2px solid #5A4633;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      color: #5A4633;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-block;
      padding: 1rem 1.5rem;
      background: #A7C4A0;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      color: #3A2F25;
      text-decoration: none;
    }

    .btn:hover {
      background: #8fb48a;
    }

    .small {
      margin-top: 2rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🎉 Paiement réussi !</h1>

  <p>Merci pour votre réservation aux <b>Tonneaux des Ô</b>.<br>
  Votre séjour est maintenant confirmé.</p>

  <p>Vous pouvez télécharger votre facture ci‑dessous :</p>

  <!-- 🔥 Bouton pour télécharger la facture -->
  <button id="facture-btn" class="btn">Télécharger la facture</button>

  <br><br>

  <a href="main.html" class="btn">Retour à l'accueil</a>

  <p class="small">Un email de confirmation vous a également été envoyé.</p>
</div>

<script>
async function getInvoice() {
  const sessionId = new URLSearchParams(window.location.search).get("session_id");

  if (!sessionId) {
    alert("Impossible de récupérer la facture (session manquante).");
    return;
  }

  const res = await fetch(`https://h-e5oa.onrender.com/api/invoice/${sessionId}`);
  const json = await res.json();

  if (!json.url) {
    alert("La facture n'est pas encore disponible. Réessayez dans quelques secondes.");
    return;
  }

  // 🔥 Ouvre directement le PDF
  window.location.href = json.url;
}

document.getElementById("facture-btn").onclick = getInvoice;
</script>

</body>
</html>
