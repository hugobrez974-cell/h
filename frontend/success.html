<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paiement réussi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #1f2933 0, #020308 55%, #000 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      background: rgba(0,0,0,0.55);
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 18px rgba(0,0,0,0.6);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 1.6rem;
      color: #f4c27a;
    }

    p {
      margin-bottom: 20px;
      color: #ddd;
      font-size: 1rem;
    }

    a {
      display: inline-block;
      padding: 12px 20px;
      background: #f4c27a;
      color: #000;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.15s;
    }

    a:hover {
      filter: brightness(1.1);
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Paiement confirmé</h1>
  <p>Votre réservation a bien été enregistrée.<br>Un email de confirmation vous a été envoyé.</p>
  <a href="index.html">Retour à l’accueil</a>
</div>

</body>
</html>
