<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paiement réussi – Les Tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #F4E9D8;
      color: #3A2F25;
      text-align: center;
      padding: 3rem 1rem;
    }

    .box {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      border: 2px solid #5A4633;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      color: #5A4633;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 1rem 1.5rem;
      background: #A7C4A0;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      color: #3A2F25;
      text-decoration: none;
    }

    .btn:hover {
      background: #8fb48a;
    }

    .info {
      margin-top: 1rem;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    img.logo {
      width: 220px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="box">

  <!-- 🔥 TON LOGO -->
  <img src="/logo.png" class="logo" alt="Les Tonneaux des Ô">
  <h3>Les Tonneaux des Ô</h3>
  <p>Séjour nature et détente à Bois Court</p>

  <h1>🎉 Paiement réussi !</h1>

  <div id="details" class="info">
    Chargement des informations…
  </div>

  <!-- 🔥 Bouton facture Stripe -->
  <button id="facture-btn" class="btn">Télécharger la facture Stripe</button>

  <!-- 🔥 Bouton facture personnalisée -->
  <button id="facture-custom" class="btn" style="background:#D9B77A;">Télécharger la facture personnalisée</button>

  <br><br>

  <a href="main.html" class="btn">Retour à l'accueil</a>
</div>

<script>
async function loadInvoice() {
  const sessionId = new URLSearchParams(window.location.search).get("session_id");
  if (!sessionId) return;

  // 🔥 Récupération de la facture Stripe
  const res = await fetch(`https://h-e5oa.onrender.com/api/invoice/${sessionId}`);
  const json = await res.json();
  window.invoiceUrl = json.url;

  // 🔥 Récupération des infos de réservation
  const res2 = await fetch("https://h-e5oa.onrender.com/api/reservations");
  const all = await res2.json();

  const reservation = all.find(r => r.sessionId === sessionId) || all[all.length - 1];

  document.getElementById("details").innerHTML = `
    <b>Bungalow :</b> ${reservation.bungalow}<br>
    <b>Arrivée :</b> ${reservation.dateArrivee}<br>
    <b>Départ :</b> ${reservation.dateDepart}<br>
    <b>Montant :</b> ${reservation.price} €
  `;

  // 🔥 Téléchargement automatique de la facture Stripe
  if (window.invoiceUrl) {
    setTimeout(() => {
      window.location.href = window.invoiceUrl;
    }, 1500);
  }
}

// 🔥 Bouton facture Stripe
document.getElementById("facture-btn").onclick = () => {
  if (window.invoiceUrl) window.location.href = window.invoiceUrl;
};

// 🔥 Bouton facture personnalisée
document.getElementById("facture-custom").onclick = () => {
  const sessionId = new URLSearchParams(window.location.search).get("session_id");
  window.location.href = `https://h-e5oa.onrender.com/api/custom-invoice/${sessionId}`;
};

loadInvoice();
</script>

</body>
</html>
