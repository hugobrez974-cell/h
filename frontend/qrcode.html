<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les Bungalows – Redirection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Redirection automatique après 5 secondes vers les disponibilités -->
  <meta http-equiv="refresh" content="5;url=https://h-ptt9.onrender.com/Dispo.html">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      padding: 24px 28px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      max-width: 420px;
      text-align: center;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      color: #23422f;
    }
    p {
      margin: 0.4rem 0;
      color: #444;
      line-height: 1.4;
    }
    .small {
      font-size: 0.85rem;
      color: #777;
      margin-top: 0.8rem;
    }
    .btn-green {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 10px 18px;
      border-radius: 999px;
      background: #2f8a3a;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-green:hover {
      background: #277131;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bonjour 👋</h1>
    <p>Vous avez scanné la carte de visite <strong>Les Bungalows</strong>.</p>
    <p>Nous allons vous rediriger vers les disponibilités.</p>
    <p class="small">(Si vous voulez réserver, appuyez sur la case verte ci‑dessous.)</p>

    <a class="btn-green" href="https://h-ptt9.onrender.com">
      Voir les disponibilités et réserver
    </a>

    <p class="small">Redirection automatique dans quelques secondes…</p>
  </div>
</body>
</html>
