<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paiement annulé – Les Tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #1f2933 0, #020308 55%, #000 100%);
      color: #f7f7f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      margin-top: 80px;
      background: rgba(15, 23, 42, 0.85);
      padding: 30px 26px;
      border-radius: 18px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 10px;
      color: #f97373;
    }

    p {
      color: #d1d5db;
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f4c27a, #f59e0b);
      color: #1f2933;
      font-weight: 600;
      text-decoration: none;
      font-size: 1rem;
      box-shadow: 0 14px 30px rgba(0,0,0,0.7);
      transition: 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Paiement annulé</h1>
  <p>Votre paiement n’a pas été finalisé.  
  Vous pouvez réessayer ou revenir à l’accueil.</p>

  <a href="reservation.html" class="btn">Réessayer</a>
</div>

</body>
</html>
