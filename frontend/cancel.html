<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paiement annulé</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bois: #5A4633;
      --sable: #F4E9D8;
      --vert: #A7C4A0;
      --blanc: #d6c7a0;
      --texte: #3A2F25;
    }

    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      background: var(--sable);
      color: var(--texte);
      padding: 2rem;
      text-align: center;
    }

    .box {
      max-width: 450px;
      margin: auto;
      background: var(--blanc);
      padding: 2rem;
      border-radius: 1rem;
      border: 2px solid var(--bois);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #b33a3a;
    }

    p {
      margin-top: 1rem;
      font-size: 1.2rem;
    }

    .btn {
      display: block;
      margin: 2rem auto 0;
      padding: 0.9rem 1.6rem;
      background: var(--vert);
      color: var(--bois);
      border-radius: 999px;
      font-weight: 700;
      font-size: 1.1rem;
      border: 2px solid var(--bois);
      text-decoration: none;
      width: fit-content;
    }

    .btn:hover { filter: brightness(1.05); }

    .phone {
      margin-top: 1.5rem;
      font-weight: 600;
      color: var(--bois);
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Paiement annulé</h1>
  <p>Votre paiement n’a pas été finalisé.</p>

  <a href="reservation.html" class="btn">Réessayer</a>

  <p>Contacter nous si vous tomber sur cette page à chaque payement confirmer</p>
</div>

</body>
</html>
