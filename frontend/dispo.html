<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Disponibilités – Les Tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<header>
  <div class="logo">Les tonneaux des Ô</div>

  <div class="burger" onclick="toggleMenu()">☰</div>

  <nav>
    <a href="/main.html">Accueil</a>
    <a href="/dispo.html">Disponibilités</a>
    <a href="/reservation.html">Réserver</a>
    <a href="/main.html">Bungalows</a>
    <a href="/main.html">Contact</a>
  </nav>
</header>

<div id="mobileMenu">
  <a href="/main.html" onclick="toggleMenu()">Accueil</a>
  <a href="/dispo.html" onclick="toggleMenu()">Disponibilités</a>
  <a href="/reservation.html" onclick="toggleMenu()">Réserver</a>
  <a href="/main.html" onclick="toggleMenu()">Bungalows</a>
  <a href="/main.html" onclick="toggleMenu()">Contact</a>
  <a href="#" onclick="toggleMenu()">Fermer</a>
</div>

<style>
   :root {
    --bois: #5A4633;
    --sable: #F4E9D8;
    --vert: #A7C4A0;
    --blanc: #d6c7a0;
    --or: #D9B77A;
    --texte: #3A2F25;
  }

  header {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #e5d8c8;
    z-index: 10000;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--bois);
    letter-spacing: 0.05em;
  }

  nav {
    display: flex;
    gap: 1.5rem;
  }

  nav a {
    text-decoration: none;
    color: var(--bois);
    font-weight: 600;
  }

  nav a:hover { color: var(--vert); }

  .burger {
    display: none;
    font-size: 28px;
    cursor: pointer;
    color: var(--bois);
  }

  #mobileMenu {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: var(--bois);
    color: var(--sable);
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    transition: right 0.35s ease;
    z-index: 99999;
  }

  #mobileMenu.open {
    right: 0;
  }

  #mobileMenu a {
    color: var(--sable);
    text-decoration: none;
    font-size: 1.2rem;
    font-weight: 600;
  }

  #mobileMenu a:hover {
    color: var(--vert);
  }

  @media (max-width: 800px) {
    nav { display: none; }
    .burger { display: block; }
  }
  
  body {
    font-family: 'Nunito', sans-serif;
    background: #F4E9D8;
    color: #3A2F25;
    padding: 2rem;
  }
  .box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    border: 2px solid #5A4633;
    max-width: 500px;
    margin: auto;
  }
  input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #b9a58a;
  }
  .btn {
    background: #A7C4A0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }
  .btn:hover {
    background: #8fb48a;
  }
  .result {
    margin-top: 20px;
    font-size: 1.2rem;
    text-align: center;
  }
</style>

<div class="box">
  <h2>Vérifier les disponibilités</h2>

  <label>Bungalow :</label>
  <select id="bungalow">
    <option value="1">Bungalow 1</option>
    <option value="2">Bungalow 2</option>
    <option value="3">Bungalow 3</option>
  </select>

  <label>Date d’arrivée :</label>
  <input type="date" id="dateArrivee">

  <label>Date de départ :</label>
  <input type="date" id="dateDepart">

  <button class="btn" onclick="check()">Vérifier</button>

  <div id="result" class="result"></div>
</div>

<script>
const BASE_URL = "https://h-e5oa.onrender.com";

async function check() {
  const bungalow = document.getElementById("bungalow").value;
  const dateA = document.getElementById("dateArrivee").value;
  const dateD = document.getElementById("dateDepart").value;

  if (!dateA || !dateD) {
    document.getElementById("result").innerHTML = "Veuillez choisir les dates.";
    return;
  }

  const res = await fetch(`${BASE_URL}/api/reservations`);
  const data = await res.json();

  const overlap = data.some(r =>
    r.bungalow == bungalow &&
    !(dateD <= r.dateArrivee || dateA >= r.dateDepart)
  );

  if (overlap) {
    document.getElementById("result").innerHTML = "❌ Ce bungalow est occupé.";
  } else {
    document.getElementById("result").innerHTML = `
      ✅ Disponible !<br><br>
      <a class="btn" href="reservation.html?bungalow=${bungalow}&dateA=${dateA}&dateD=${dateD}">
        Réserver maintenant
      </a>
    `;
  }
}
</script>

</body>
</html>
