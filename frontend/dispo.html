<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Disponibilités – Les Tonneaux des Ô</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bois: #5A4633;
      --sable: #F4E9D8;
      --vert: #A7C4A0;
      --texte: #3A2F25;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--sable);
      color: var(--texte);
      padding: 2rem;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5d8c8;
      z-index: 10000;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--bois);
    }

    nav.desktop-menu {
      display: flex;
      gap: 1.5rem;
    }

    nav.desktop-menu a {
      text-decoration: none;
      color: var(--bois);
      font-weight: 600;
    }

    nav.desktop-menu a:hover {
      color: var(--vert);
    }

    .burger {
      display: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--bois);
    }

    #mobileMenu {
      position: fixed;
      top: 0;
      right: -500px;
      width: 260px;
      height: 100%;
      background: var(--bois);
      color: var(--sable);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      transition: right 0.35s ease;
      z-index: 99999;
    }

    #mobileMenu.open {
      right: 0;
    }

    #mobileMenu a {
      color: var(--sable);
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      nav.desktop-menu { display: none; }
      .burger { display: block; }
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      border: 1px solid #d2c1a5;
      margin-top: 2rem;
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--vert);
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      color: var(--bois);
      margin-top: 1rem;
    }

    button:hover {
      background: #8fb88f;
    }

    .result {
      margin-top: 2rem;
      padding: 1rem;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #d2c1a5;
    }

    .bungalow-btn {
      padding: 12px;
      background: var(--vert);
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      color: var(--bois);
      width: 100%;
      margin-top: 10px;
    }

    .bungalow-btn:hover {
      background: #8fb88f;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Les tonneaux des Ô</div>
  <div class="burger" onclick="toggleMenu()">☰</div>

  <nav class="desktop-menu">
    <a href="/main.html">Accueil</a>
    <a href="/dispo.html">Disponibilités</a>
    <a href="/reservation.html">Réserver</a>
    <a href="/main.html">Bungalows</a>
    <a href="/main.html">Contact</a>
  </nav>
</header>

<div id="mobileMenu">
  <a href="/main.html" onclick="toggleMenu()">Accueil</a>
  <a href="/dispo.html" onclick="toggleMenu()">Disponibilités</a>
  <a href="/reservation.html" onclick="toggleMenu()">Réserver</a>
  <a href="/main.html" onclick="toggleMenu()">Bungalows</a>
  <a href="/main.html" onclick="toggleMenu()">Contact</a>
  <a href="#" onclick="toggleMenu()">Fermer</a>
</div>

<script>
  function toggleMenu() {
    document.getElementById("mobileMenu").classList.toggle("open");
  }
</script>

<h1 style="text-align:center;color:var(--bois);">Vérifier les disponibilités</h1>

<div class="container">

  <label>Date d’arrivée :</label>
  <input type="date" id="dateA">

  <label>Date de départ :</label>
  <input type="date" id="dateD">

  <button onclick="checkDispo()">Voir les disponibilités</button>

  <div id="result" class="result" style="display:none;"></div>

</div>

<script>
const BASE_URL = "https://h-e5oa.onrender.com";

function chevauche(a1, d1, a2, d2) {
  return !(d1 <= a2 || d2 <= a1);
}

async function checkDispo() {
  const dateA = document.getElementById("dateA").value;
  const dateD = document.getElementById("dateD").value;

  if (!dateA || !dateD) {
    alert("Veuillez choisir deux dates.");
    return;
  }

  const res = await fetch(`${BASE_URL}/api/reservations`);
  const reservations = await res.json();

  let dispo1 = true;
  let dispo2 = true;

  reservations.forEach(r => {
    if (chevauche(dateA, dateD, r.dateArrivee, r.dateDepart)) {
      if (r.bungalow.includes("1")) dispo1 = false;
      if (r.bungalow.includes("2")) dispo2 = false;
    }
  });

  let html = "<h3>Bungalows disponibles :</h3>";

  if (dispo1) {
    html += `
      <button class="bungalow-btn"
        onclick="goResa('1')">Réserver le Bungalow 1</button>`;
  }

  if (dispo2) {
    html += `
      <button class="bungalow-btn"
        onclick="goResa('2')">Réserver le Bungalow 2</button>`;
  }

  if (dispo1 && dispo2) {
    html += `
      <button class="bungalow-btn"
        onclick="goResa('1,2')">Réserver les deux bungalows</button>`;
  }

  if (!dispo1 && !dispo2) {
    html = "<p>Aucun bungalow n'est disponible à ces dates.</p>";
  }

  const result = document.getElementById("result");
  result.innerHTML = html;
  result.style.display = "block";
}

function goResa(bungalow) {
  const dateA = document.getElementById("dateA").value;
  const dateD = document.getElementById("dateD").value;

  window.location.href =
    `/reservation.html?bungalow=${bungalow}&dateA=${dateA}&dateD=${dateD}`;
}
</script>

</body>
</html>
