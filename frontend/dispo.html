<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Disponibilités – Les Tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bois: #5A4633;
      --sable: #F4E9D8;
      --vert: #A7C4A0;
      --texte: #3A2F25;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--sable);
      color: var(--texte);
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      border: 1px solid #d2c1a5;
      margin-top: 2rem;
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--vert);
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      color: var(--bois);
      margin-top: 1rem;
    }

    button:hover {
      background: #8fb88f;
    }

    .result {
      margin-top: 2rem;
      padding: 1rem;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #d2c1a5;
    }

    .bungalow-btn {
      padding: 12px;
      background: var(--vert);
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      color: var(--bois);
      width: 100%;
      margin-top: 10px;
    }

    .bungalow-btn:hover {
      background: #8fb88f;
    }
  </style>
</head>

<body>

<h1 style="text-align:center;color:var(--bois);">Vérifier les disponibilités</h1>

<div class="container">

  <label>Date d’arrivée :</label>
  <input type="date" id="dateA">

  <label>Date de départ :</label>
  <input type="date" id="dateD">

  <button onclick="checkDispo()">Voir les disponibilités</button>

  <div id="result" class="result" style="display:none;"></div>

</div>

<script>
const BASE_URL = "https://h-e5oa.onrender.com";

// Vérifier si une période chevauche une réservation existante
function chevauche(a1, d1, a2, d2) {
  return !(d1 <= a2 || d2 <= a1);
}

async function checkDispo() {
  const dateA = document.getElementById("dateA").value;
  const dateD = document.getElementById("dateD").value;

  if (!dateA || !dateD) {
    alert("Veuillez choisir deux dates.");
    return;
  }

  const res = await fetch(`${BASE_URL}/api/reservations`);
  const reservations = await res.json();

  let dispo1 = true;
  let dispo2 = true;

  reservations.forEach(r => {
    if (chevauche(dateA, dateD, r.dateArrivee, r.dateDepart)) {
      if (r.bungalow.includes("1")) dispo1 = false;
      if (r.bungalow.includes("2")) dispo2 = false;
    }
  });

  let html = "<h3>Bungalows disponibles :</h3>";

  if (dispo1) {
    html += `
      <button class="bungalow-btn"
        onclick="goResa('1')">Réserver le Bungalow 1</button>`;
  }

  if (dispo2) {
    html += `
      <button class="bungalow-btn"
        onclick="goResa('2')">Réserver le Bungalow 2</button>`;
  }

  if (dispo1 && dispo2) {
    html += `
      <button class="bungalow-btn"
        onclick="goResa('1,2')">Réserver les deux bungalows</button>`;
  }

  if (!dispo1 && !dispo2) {
    html = "<p>Aucun bungalow n'est disponible à ces dates.</p>";
  }

  const result = document.getElementById("result");
  result.innerHTML = html;
  result.style.display = "block";
}

function goResa(bungalow) {
  const dateA = document.getElementById("dateA").value;
  const dateD = document.getElementById("dateD").value;

  window.location.href =
    `/reservation.html?bungalow=${bungalow}&dateA=${dateA}&dateD=${dateD}`;
}
</script>

</body>
</html>
