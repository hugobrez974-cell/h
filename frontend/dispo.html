<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Disponibilités – Les Tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<!-- NAVBAR -->
<style>
  .nav {
    background: #5A4633;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 25px;
    border-bottom: 3px solid #D9C7A3;
  }
  .nav a {
    color: #F4E9D8;
    font-weight: 700;
    text-decoration: none;
    font-size: 1.1rem;
  }
  .nav a:hover {
    color: #A7C4A0;
  }
</style>

<div class="nav">
  <a href="main.html">Accueil</a>
  <a href="dispo.html">Disponibilités</a>
  <a href="reservation.html">Réserver</a>
  <a href="main.html">Nos bungalows</a>
  <a href="main.html">Contact</a>
</div>

<style>
  body {
    font-family: 'Nunito', sans-serif;
    background: #F4E9D8;
    color: #3A2F25;
    padding: 2rem;
  }
  .box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    border: 2px solid #5A4633;
    max-width: 500px;
    margin: auto;
  }
  input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #b9a58a;
  }
  .btn {
    background: #A7C4A0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }
  .btn:hover {
    background: #8fb48a;
  }
  .result {
    margin-top: 20px;
    font-size: 1.2rem;
    text-align: center;
  }
</style>

<div class="box">
  <h2>Vérifier les disponibilités</h2>

  <label>Bungalow :</label>
  <select id="bungalow">
    <option value="1">Bungalow 1</option>
    <option value="2">Bungalow 2</option>
    <option value="3">Bungalow 3</option>
  </select>

  <label>Date d’arrivée :</label>
  <input type="date" id="dateArrivee">

  <label>Date de départ :</label>
  <input type="date" id="dateDepart">

  <button class="btn" onclick="check()">Vérifier</button>

  <div id="result" class="result"></div>
</div>

<script>
const BASE_URL = "https://h-e5oa.onrender.com";

async function check() {
  const bungalow = document.getElementById("bungalow").value;
  const dateA = document.getElementById("dateArrivee").value;
  const dateD = document.getElementById("dateDepart").value;

  if (!dateA || !dateD) {
    document.getElementById("result").innerHTML = "Veuillez choisir les dates.";
    return;
  }

  const res = await fetch(`${BASE_URL}/api/reservations`);
  const data = await res.json();

  const overlap = data.some(r =>
    r.bungalow == bungalow &&
    !(dateD <= r.dateArrivee || dateA >= r.dateDepart)
  );

  if (overlap) {
    document.getElementById("result").innerHTML = "❌ Ce bungalow est occupé.";
  } else {
    document.getElementById("result").innerHTML = `
      ✅ Disponible !<br><br>
      <a class="btn" href="main.html?bungalow=${bungalow}&dateA=${dateA}&dateD=${dateD}">
        Réserver maintenant
      </a>
    `;
  }
}
</script>

</body>
</html>
