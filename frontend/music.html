<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lecteur Spotify</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #121212;
            font-family: Arial, sans-serif;
            color: white;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .card {
            background: #181818;
            padding: 20px;
            border-radius: 12px;
            transition: 0.2s;
            cursor: pointer;
        }

        .card:hover {
            background: #282828;
            transform: scale(1.03);
        }

        .cover {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #444, #222);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #bbb;
        }

        .title {
            font-size: 16px;
            font-weight: bold;
            height: 40px;
            overflow: hidden;
        }

        /* --- BARRE SPOTIFY --- */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #181818;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid #333;
        }

        .play-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #1DB954;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
        }

        .track-info {
            flex: 1;
        }

        .track-title {
            font-size: 18px;
            font-weight: bold;
        }

        .timeline {
            width: 100%;
        }
    </style>
</head>
<body>

<h1>🎵 Playlist Spotify</h1>

<div class="grid" id="liste"></div>

<!-- BARRE DE LECTURE -->
<div class="player-bar">
    <div class="play-btn" id="playBtn">▶</div>

    <div class="track-info">
        <div class="track-title" id="currentTitle">Aucune musique</div>
        <input type="range" id="timeline" class="timeline" value="0" min="0" max="100">
    </div>

    <audio id="audioPlayer"></audio>
</div>

<script>
    const mp3Files = [
        "/Claudio Capéo - Un homme debout (clip officiel).mp3",
        "/Bruno Mars - 24K Magic (Official Music Video).mp3",
        "/SARAH SHATTA.mp3",
        "/Hugo TSR - Là-Haut (clip officiel).mp3",
        "/Hugo TSR - Les vieux de mon âge.mp3",
        "/Nèg' Marrons - Le bilan (Clip officiel).mp3"
    ];

    const container = document.getElementById("liste");
    const audio = document.getElementById("audioPlayer");
    const playBtn = document.getElementById("playBtn");
    const timeline = document.getElementById("timeline");
    const currentTitle = document.getElementById("currentTitle");

    let currentTrack = null;

    // Affichage des cartes
    mp3Files.forEach(file => {
        const name = file.replace("/", "");

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="cover">🎧</div>
            <div class="title">${name}</div>
        `;

        div.onclick = () => {
            audio.src = file;
            audio.play();
            currentTrack = file;
            currentTitle.textContent = name;
            playBtn.textContent = "⏸";
        };

        container.appendChild(div);
    });

    // Bouton Play/Pause
    playBtn.onclick = () => {
        if (!currentTrack) return;

        if (audio.paused) {
            audio.play();
            playBtn.textContent = "⏸";
        } else {
            audio.pause();
            playBtn.textContent = "▶";
        }
    };

    // Timeline
    audio.ontimeupdate = () => {
        timeline.value = (audio.currentTime / audio.duration) * 100;
    };

    timeline.oninput = () => {
        audio.currentTime = (timeline.value / 100) * audio.duration;
    };
</script>

</body>
</html>
