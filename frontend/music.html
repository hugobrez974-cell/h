<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Musique</title>

    <style>
        body {
            margin: 0;
            background: #121212;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
        }

        /* --- COLONNE GAUCHE : ALBUMS --- */
        .content {
            flex: 1;
            padding: 20px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .card {
            background: #181818;
            padding: 20px;
            border-radius: 12px;
            transition: 0.2s;
            cursor: pointer;
        }

        .card:hover {
            background: #282828;
            transform: scale(1.03);
        }

        .cover {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #444, #222);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #bbb;
        }

        .title {
            font-size: 16px;
            font-weight: bold;
            height: 40px;
            overflow: hidden;
        }

        /* --- COLONNE DROITE : PLAYLIST --- */
        .playlist {
            width: 300px;
            background: #181818;
            border-left: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
            height: calc(100vh - 90px);
        }

        .playlist h2 {
            margin-top: 0;
            font-size: 22px;
        }

        .track-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .track-item:hover {
            background: #282828;
        }

        .track-item.active {
            background: #1DB954;
            color: black;
            font-weight: bold;
        }

        /* --- BARRE SPOTIFY --- */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #181818;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid #333;
        }

        .control-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .control-btn:hover {
            background: #444;
            transform: scale(1.1);
        }

        .play-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #1DB954;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
        }

        .track-info {
            flex: 1;
        }

        .track-title {
            font-size: 18px;
            font-weight: bold;
        }

        .timeline {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="content">
    <h1 id="welcomeTitle">🎵 Musique disponible</h1>
    <div class="grid" id="liste"></div>
</div>

<!-- PLAYLIST À DROITE -->
<div class="playlist" id="playlist">
    <h2>Titres</h2>
</div>

<!-- BARRE DE LECTURE -->
<div class="player-bar">
    <div class="control-btn" id="prevBtn">⏮</div>
    <div class="play-btn" id="playBtn">▶</div>
    <div class="control-btn" id="nextBtn">⏭</div>

    <div class="track-info">
        <div class="track-title" id="currentTitle">Aucune musique</div>
        <input type="range" id="timeline" class="timeline" value="0" min="0" max="100">
    </div>

    <audio id="audioPlayer"></audio>
</div>

<script>
/* ------------------------------
   GESTION DU PRENOM AVEC COOKIE
--------------------------------*/
function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + (days*24*60*60*1000));
    document.cookie = name + "=" + value + ";expires="+ d.toUTCString() + ";path=/";
}

function getCookie(name) {
    let cname = name + "=";
    let decoded = decodeURIComponent(document.cookie);
    let ca = decoded.split(';');
    for(let c of ca) {
        c = c.trim();
        if (c.indexOf(cname) === 0) return c.substring(cname.length, c.length);
    }
    return "";
}

let prenom = getCookie("prenom");

if (!prenom) {
    prenom = prompt("Quel est ton prénom ?");
    if (prenom && prenom.trim() !== "") {
        setCookie("prenom", prenom, 365);
    } else {
        prenom = "invité";
    }
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("welcomeTitle").innerHTML = "🎵 Bonjour " + prenom + " — Musique disponible";
});

/* ------------------------------
   LECTEUR SPOTIFY
--------------------------------*/
const container = document.getElementById("liste");
const playlist = document.getElementById("playlist");
const audio = document.getElementById("audioPlayer");

const playBtn = document.getElementById("playBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const timeline = document.getElementById("timeline");
const currentTitle = document.getElementById("currentTitle");

let mp3Files = [];
let currentIndex = -1;

function playTrack(index) {
    currentIndex = index;
    const file = mp3Files[index];
    const name = file.replace("/", "");

    audio.src = file;
    audio.play();

    currentTitle.textContent = name;
    playBtn.textContent = "⏸";

    document.querySelectorAll(".track-item").forEach(el => el.classList.remove("active"));
    document.getElementById("track-" + btoa(file)).classList.add("active");
}

function playNext() {
    if (currentIndex < mp3Files.length - 1) {
        playTrack(currentIndex + 1);
    }
}

function playPrev() {
    if (currentIndex > 0) {
        playTrack(currentIndex - 1);
    }
}

// Charger automatiquement mp3.json
fetch("mp3.json")
    .then(r => r.json())
    .then(files => {
        mp3Files = files;

        files.forEach((file, index) => {
            const name = file.replace("/", "");

            // Cartes
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
                <div class="cover">🎧</div>
                <div class="title">${name}</div>
            `;
            div.onclick = () => playTrack(index);
            container.appendChild(div);

            // Playlist
            const item = document.createElement("div");
            item.className = "track-item";
            item.id = "track-" + btoa(file);
            item.textContent = name;
            item.onclick = () => playTrack(index);
            playlist.appendChild(item);
        });
    });

// Play/Pause
playBtn.onclick = () => {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
    } else {
        audio.pause();
        playBtn.textContent = "▶";
    }
};

// Suivant / Précédent
nextBtn.onclick = playNext;
prevBtn.onclick = playPrev;

// Timeline
audio.ontimeupdate = () => {
    timeline.value = (audio.currentTime / audio.duration) * 100;
};

timeline.oninput = () => {
    audio.currentTime = (timeline.value / 100) * audio.duration;
};

// Quand une musique se termine → passer à la suivante
audio.onended = playNext;
</script>

</body>
</html>
