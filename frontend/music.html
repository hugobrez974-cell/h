<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lecteur MP3 – Style Spotify</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #121212;
            font-family: Arial, sans-serif;
            color: white;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .card {
            background: #181818;
            padding: 20px;
            border-radius: 12px;
            transition: 0.2s;
            cursor: pointer;
        }

        .card:hover {
            background: #282828;
            transform: scale(1.03);
        }

        .cover {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #444, #222);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #bbb;
        }

        .title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            height: 40px;
            overflow: hidden;
        }

        audio {
            width: 100%;
        }
    </style>
</head>
<body>

<h1>🎵 Playlist automatique</h1>

<div class="grid" id="liste"></div>

<script>
    const mp3Files = [
        "/Claudio Capéo - Un homme debout (clip officiel).mp3",
        "/Bruno Mars - 24K Magic (Official Music Video).mp3",
        "/SARAH SHATTA.mp3",
        "/Hugo TSR - Là-Haut (clip officiel).mp3",
        "/Hugo TSR - Les vieux de mon âge.mp3"
    ];

    const container = document.getElementById("liste");

    mp3Files.forEach(file => {
        const name = file.replace("/", "");

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="cover">🎧</div>
            <div class="title">${name}</div>
            <audio controls src="${file}"></audio>
        `;

        container.appendChild(div);
    });
</script>

</body>
</html>
