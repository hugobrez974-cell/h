<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Musique</title>

    <style>
        body {
            margin: 0;
            background: #121212;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
        }

        .content {
            flex: 1;
            padding: 20px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .card {
            background: #181818;
            padding: 20px;
            border-radius: 12px;
            transition: 0.2s;
            cursor: pointer;
        }

        .card:hover {
            background: #282828;
            transform: scale(1.03);
        }

        .cover {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        .title {
            font-size: 16px;
            font-weight: bold;
            height: 40px;
            overflow: hidden;
        }

        .playlist {
            width: 300px;
            background: #181818;
            border-left: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
            height: calc(100vh - 120px);
        }

        .track-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .track-item:hover {
            background: #282828;
        }

        .track-item.active {
            background: #1DB954;
            color: black;
            font-weight: bold;
        }

        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #181818;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid #333;
        }

        .control-btn, .small-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .control-btn:hover, .small-btn:hover {
            background: #444;
            transform: scale(1.1);
        }

        .play-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #1DB954;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
        }

        .track-info {
            flex: 1;
        }

        .timeline {
            width: 100%;
        }

        .volume-slider {
            width: 120px;
        }
    </style>
</head>
<body>

<div class="content">
    <h1 id="welcomeTitle">🎵 Playlist Spotify</h1>
    <div class="grid" id="liste"></div>
</div>

<div class="playlist" id="playlist">
    <h2>Titres</h2>
</div>

<div class="player-bar">
    <div class="small-btn" id="shuffleBtn">🔀</div>
    <div class="control-btn" id="prevBtn">⏮</div>
    <div class="play-btn" id="playBtn">▶</div>
    <div class="control-btn" id="nextBtn">⏭</div>
    <div class="small-btn" id="repeatBtn">🔁</div>

    <div class="track-info">
        <div class="track-title" id="currentTitle">Aucune musique</div>
        <input type="range" id="timeline" class="timeline" value="0" min="0" max="100">
    </div>

    <div class="small-btn" id="muteBtn">🔊</div>
    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">

    <audio id="audioPlayer"></audio>
</div>

<script>
/* ------------------------------
   COOKIES : PRENOM
--------------------------------*/
function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + (days*24*60*60*1000));
    document.cookie = name + "=" + value + ";expires="+ d.toUTCString() + ";path=/";
}

function getCookie(name) {
    let cname = name + "=";
    let decoded = decodeURIComponent(document.cookie);
    let ca = decoded.split(';');
    for(let c of ca) {
        c = c.trim();
        if (c.indexOf(cname) === 0) return c.substring(cname.length, c.length);
    }
    return "";
}

let prenom = getCookie("prenom");
if (!prenom) {
    prenom = prompt("Quel est ton prénom ?");
    if (prenom && prenom.trim() !== "") setCookie("prenom", prenom, 365);
    else prenom = "invité";
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("welcomeTitle").innerHTML = "🎵 Bonjour " + prenom + " — Musique disponible";
});

/* ------------------------------
   LECTEUR SPOTIFY
--------------------------------*/
const container = document.getElementById("liste");
const playlist = document.getElementById("playlist");
const audio = document.getElementById("audioPlayer");

const playBtn = document.getElementById("playBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const shuffleBtn = document.getElementById("shuffleBtn");
const repeatBtn = document.getElementById("repeatBtn");
const muteBtn = document.getElementById("muteBtn");
const volumeSlider = document.getElementById("volumeSlider");

const timeline = document.getElementById("timeline");
const currentTitle = document.getElementById("currentTitle");

let mp3Files = [];
let currentIndex = -1;
let shuffle = false;
let repeat = false;

function randomColor() {
    return "hsl(" + Math.floor(Math.random()*360) + ", 60%, 40%)";
}

function playTrack(index) {
    currentIndex = index;
    const file = mp3Files[index];
    const name = file.replace("/", "");

    audio.src = file;
    audio.play();

    currentTitle.textContent = name;
    playBtn.textContent = "⏸";

    document.querySelectorAll(".track-item").forEach(el => el.classList.remove("active"));
    document.getElementById("track-" + btoa(file)).classList.add("active");
}

function playNext() {
    if (shuffle) {
        playTrack(Math.floor(Math.random() * mp3Files.length));
    } else if (currentIndex < mp3Files.length - 1) {
        playTrack(currentIndex + 1);
    }
}

function playPrev() {
    if (shuffle) {
        playTrack(Math.floor(Math.random() * mp3Files.length));
    } else if (currentIndex > 0) {
        playTrack(currentIndex - 1);
    }
}

fetch("mp3.json")
    .then(r => r.json())
    .then(files => {
        mp3Files = files;

        files.forEach((file, index) => {
            const name = file.replace("/", "");

            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
                <div class="cover" style="background:${randomColor()}">🎧</div>
                <div class="title">${name}</div>
            `;
            div.onclick = () => playTrack(index);
            container.appendChild(div);

            const item = document.createElement("div");
            item.className = "track-item";
            item.id = "track-" + btoa(file);
            item.textContent = name;
            item.onclick = () => playTrack(index);
            playlist.appendChild(item);
        });
    });

playBtn.onclick = () => {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
    } else {
        audio.pause();
        playBtn.textContent = "▶";
    }
};

nextBtn.onclick = playNext;
prevBtn.onclick = playPrev;

shuffleBtn.onclick = () => {
    shuffle = !shuffle;
    shuffleBtn.style.background = shuffle ? "#1DB954" : "#333";
};

repeatBtn.onclick = () => {
    repeat = !repeat;
    repeatBtn.style.background = repeat ? "#1DB954" : "#333";
};

muteBtn.onclick = () => {
    audio.muted = !audio.muted;
    muteBtn.textContent = audio.muted ? "🔇" : "🔊";
};

volumeSlider.oninput = () => {
    audio.volume = volumeSlider.value;
};

audio.ontimeupdate = () => {
    timeline.value = (audio.currentTime / audio.duration) * 100;
};

timeline.oninput = () => {
    audio.currentTime = (timeline.value / 100) * audio.duration;
};

audio.onended = () => {
    if (repeat) playTrack(currentIndex);
    else playNext();
};
</script>

</body>
</html>
