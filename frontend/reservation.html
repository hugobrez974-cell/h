<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Réservation bungalow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; background:#f5f5f5; }
    .container { max-width: 500px; margin: 0 auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
    label { display:block; margin-top:10px; font-weight:600; }
    input { width:100%; padding:8px; margin-top:4px; border-radius:4px; border:1px solid #ccc; }
    button { margin-top:20px; padding:10px 16px; border:none; border-radius:4px; background:#007bff; color:#fff; font-weight:600; cursor:pointer; width:100%; }
    button:disabled { background:#aaa; cursor:not-allowed; }
    .info { margin-top:10px; font-size:14px; color:#555; }
    .alert-construction { margin-top:20px; padding:10px; background:#fff3cd; border:1px solid #ffeeba; border-radius:4px; font-size:14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Réservation</h1>

    <div id="resume"></div>

    <label for="nom">Nom</label>
    <input type="text" id="nom" placeholder="Votre nom complet" />

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Votre email" />

    <button id="btnPayer" onclick="payer()">Payer la réservation</button>

    <div class="info" id="info"></div>

    <div class="alert-construction">
      ⚠️ Le site et le système de paiement sont toujours en construction.
      Les fonctionnalités peuvent être limitées.
    </div>
  </div>

  <script>
    const API_BASE = "https://h-ptt9.onrender.com";

    function getParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        bungalow: params.get("bungalow"),
        date: params.get("date")
      };
    }

    function afficherResume() {
      const { bungalow, date } = getParams();
      const resumeDiv = document.getElementById("resume");

      if (!bungalow || !date) {
        resumeDiv.innerHTML = "<p>Paramètres de réservation manquants.</p>";
        document.getElementById("btnPayer").disabled = true;
        return;
      }

      resumeDiv.innerHTML = `
        <p><strong>Bungalow :</strong> ${bungalow}</p>
        <p><strong>Date :</strong> ${date}</p>
      `;
    }

    async function payer() {
      const { bungalow, date } = getParams();
      const nom = document.getElementById("nom").value.trim();
      const email = document.getElementById("email").value.trim();
      const info = document.getElementById("info");

      info.textContent = "";

      if (!nom || !email) {
        info.textContent = "Merci de remplir nom et email.";
        return;
      }

      if (!bungalow || !date) {
        info.textContent = "Paramètres de réservation invalides.";
        return;
      }

      const prix = 120; // adapte selon bungalow / saison

      const body = {
        nom,
        email,
        bungalow,
        debut: date,
        fin: date,
        prix
      };

      try {
        const response = await fetch(API_BASE + "/api/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const data = await response.json();

        if (!response.ok) {
          console.error("Erreur API:", data);
          info.textContent = data.error || "Erreur lors de la création du paiement.";
          return;
        }

        if (data.url) {
          window.location.href = data.url;
        } else {
          info.textContent = "Réponse inattendue du serveur.";
        }
      } catch (err) {
        console.error("Erreur fetch:", err);
        info.textContent = "Erreur réseau ou serveur.";
      }
    }

    afficherResume();
  </script>
</body>
</html>
