<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réserver – Les Tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: url('bg.jpg') center/cover no-repeat fixed,
                  radial-gradient(circle at top, #1f2933 0, #020308 55%, #000 100%);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 1.1rem;
    }

    header a {
      color: white;
      margin: 0 12px;
      text-decoration: none;
      font-weight: 500;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      font-size: 2rem;
    }

    .container {
      max-width: 420px;
      margin: 40px auto;
      padding: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-size: 1rem;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 1rem;
    }

    .btn {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: #f4c27a;
      color: black;
      border-radius: 6px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(1.1);
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #f4c27a;
      text-decoration: none;
      font-size: 1rem;
    }

    .error {
      margin-top: 10px;
      color: #ff6b6b;
      font-size: 1rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <a href="main.html">Bungalows</a>
  <a href="dispo.html">Disponibilités</a>
  <a href="reservation.html">Réserver</a>
  <a href="contact.html">Contact</a>
</header>

<h1>Réserver votre séjour</h1>

<div class="container">

  <label>Bungalow</label>
  <select id="bungalow">
    <option value="bungalow1">Bungalow 1</option>
    <option value="bungalow2">Bungalow 2</option>
  </select>

  <label>Nom complet</label>
  <input type="text" id="name">

  <label>Email</label>
  <input type="email" id="email">

  <label>Date d'arrivée</label>
  <input type="date" id="date">

  <label>Nuits</label>
  <input type="number" id="nights" value="1" min="1">

  <label>Prix total (€)</label>
  <input type="number" id="price" value="120" readonly>

  <button class="btn" onclick="payer()">Payer</button>

  <a class="back" href="main.html">← Retour à l’accueil</a>

  <div id="error" class="error"></div>
</div>

<script>
  const PRIX_NUIT = 120;

  document.getElementById("nights").addEventListener("input", () => {
    const nuits = Math.max(1, parseInt(document.getElementById("nights").value));
    document.getElementById("price").value = nuits * PRIX_NUIT;
  });

  async function payer() {
    const data = {
      bungalow: document.getElementById("bungalow").value,
      name: document.getElementById("name").value.trim(),
      email: document.getElementById("email").value.trim(),
      date: document.getElementById("date").value,
      nights: parseInt(document.getElementById("nights").value),
      price: parseInt(document.getElementById("price").value)
    };

    if (!data.name || !data.email || !data.date) {
      showError("Merci de remplir tous les champs.");
      return;
    }

    try {
      const res = await fetch("https://h-e5oa.onrender.com/api/create-checkout-session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const json = await res.json();

      if (!json.url) {
        showError("Erreur lors de la création du paiement.");
        return;
      }

      window.location.href = json.url;

    } catch (e) {
      showError("Impossible de contacter le serveur.");
    }
  }

  function showError(msg) {
    const box = document.getElementById("error");
    box.textContent = msg;
    box.style.display = "block";
  }
</script>

</body>
</html>
