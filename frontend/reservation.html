<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réserver – Les tonneaux des Ô </title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family:sans-serif; padding:2rem; background:#f4e9d8; }
    form { background:white; padding:2rem; border-radius:1rem; max-width:420px; margin:auto; }
    label { display:block; margin-top:0.8rem; }
    input, select { width:100%; padding:0.6rem; margin-top:0.3rem; }
    .date-row { display:flex; gap:0.5rem; }
    .date-row select { width:33%; }
    button { margin-top:1rem; padding:0.8rem; width:100%; background:#a7c4a0; border:none; border-radius:0.5rem; font-weight:700; cursor:pointer; }
    #prix { font-weight:700; margin-top:1rem; }

    .btn-retour {
      display:inline-block;
      padding:0.6rem 1.2rem;
      background:#a7c4a0;
      color:#3A2F25;
      border:none;
      border-radius:999px;
      font-weight:700;
      cursor:pointer;
      margin-bottom:1rem;
    }
    .btn-retour:hover {
      background:#8fb48a;
    }
  </style>
</head>
<body>

<button onclick="window.location.href='https://h-ptt9.onrender.com/main.html'" 
        class="btn-retour">
  Aller à l'accueil
</button>
<h1>Réserver</h1>

<form id="resa-form">
  <label>Nom</label>
  <input id="nom" required>

  <label>Email</label>
  <input id="email" type="email" required>

  <label>Bungalow</label>
  <select id="bungalow" required>
    <option value="bungalow1">Bungalow 1</option>
    <option value="bungalow2">Bungalow 2</option>
  </select>

  <label>Date d'arrivée</label>
  <div class="date-row">
    <select id="jour-debut"></select>
    <select id="mois-debut">
      <option value="0">Janvier</option>
      <option value="1">Février</option>
      <option value="2">Mars</option>
      <option value="3">Avril</option>
      <option value="4">Mai</option>
      <option value="5">Juin</option>
      <option value="6">Juillet</option>
      <option value="7">Août</option>
      <option value="8">Septembre</option>
      <option value="9">Octobre</option>
      <option value="10">Novembre</option>
      <option value="11">Décembre</option>
    </select>
    <select id="annee-debut"></select>
  </div>

  <label>Date de départ</label>
  <div class="date-row">
    <select id="jour-fin"></select>
    <select id="mois-fin">
      <option value="0">Janvier</option>
      <option value="1">Février</option>
      <option value="2">Mars</option>
      <option value="3">Avril</option>
      <option value="4">Mai</option>
      <option value="5">Juin</option>
      <option value="6">Juillet</option>
      <option value="7">Août</option>
      <option value="8">Septembre</option>
      <option value="9">Octobre</option>
      <option value="10">Novembre</option>
      <option value="11">Décembre</option>
    </select>
    <select id="annee-fin"></select>
  </div>

  <div id="prix">Prix : 0 €</div>

  <button type="submit">Réserver</button>
  <button type="button" onclick="payer()">💳 Payer maintenant</button>
</form>

<script>
// Remplir années
function remplirAnnees(select) {
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y <= currentYear + 5; y++) {
    const opt = document.createElement("option");
    opt.value = y;
    opt.textContent = y;
    select.appendChild(opt);
  }
}

// Remplir jours selon mois/année
function remplirJours(selectJour, selectMois, selectAnnee) {
  const mois = parseInt(selectMois.value);
  const annee = parseInt(selectAnnee.value);
  const jours = new Date(annee, mois + 1, 0).getDate();
  selectJour.innerHTML = "";
  for (let j = 1; j <= jours; j++) {
    const opt = document.createElement("option");
    opt.value = j;
    opt.textContent = j;
    selectJour.appendChild(opt);
  }
}

// Récupération des éléments
const jourDebut = document.getElementById("jour-debut");
const moisDebut = document.getElementById("mois-debut");
const anneeDebut = document.getElementById("annee-debut");

const jourFin = document.getElementById("jour-fin");
const moisFin = document.getElementById("mois-fin");
const anneeFin = document.getElementById("annee-fin");

const prixEl = document.getElementById("prix");
const nom = document.getElementById("nom");
const email = document.getElementById("email");
const bungalow = document.getElementById("bungalow");

// Initialisation
remplirAnnees(anneeDebut);
remplirAnnees(anneeFin);

anneeDebut.value = new Date().getFullYear();
anneeFin.value = new Date().getFullYear();

remplirJours(jourDebut, moisDebut, anneeDebut);
remplirJours(jourFin, moisFin, anneeFin);

// Mise à jour jours quand mois/année changent
moisDebut.addEventListener("change", () => { remplirJours(jourDebut, moisDebut, anneeDebut); majPrix(); });
anneeDebut.addEventListener("change", () => { remplirJours(jourDebut, moisDebut, anneeDebut); majPrix(); });

moisFin.addEventListener("change", () => { remplirJours(jourFin, moisFin, anneeFin); majPrix(); });
anneeFin.addEventListener("change", () => { remplirJours(jourFin, moisFin, anneeFin); majPrix(); });

// Construire une date YYYY-MM-DD
function buildDate(annee, mois, jour) {
  return `${annee}-${String(parseInt(mois)+1).padStart(2,"0")}-${String(jour).padStart(2,"0")}`;
}

// Calcul du prix côté frontend (même logique que backend)
function calculerPrix() {
  const dDebutStr = buildDate(anneeDebut.value, moisDebut.value, jourDebut.value);
  const dFinStr   = buildDate(anneeFin.value, moisFin.value, jourFin.value);

  const d1 = new Date(dDebutStr);
  const d2 = new Date(dFinStr);

  if (d2 <= d1) return 0;

  let total = 0;
  for (let d = new Date(d1); d < d2; d.setDate(d.getDate() + 1)) {
    const jour = d.getDay(); // 0=dimanche ... 5=vendredi, 6=samedi
    if (jour === 5 || jour === 6) {
      total += 150; // vendredi + samedi
    } else {
      total += 120; // semaine
    }
  }
  return total;
}

function majPrix() {
  const p = calculerPrix();
  prixEl.textContent = "Prix : " + p + " €";
}

jourDebut.addEventListener("change", majPrix);
jourFin.addEventListener("change", majPrix);

// Paiement Stripe
async function payer() {
  const dDebut = buildDate(anneeDebut.value, moisDebut.value, jourDebut.value);
  const dFin   = buildDate(anneeFin.value, moisFin.value, jourFin.value);
  const prix = calculerPrix();

  if (!nom.value || !email.value) {
    return alert("Merci de renseigner votre nom et votre email.");
  }

  if (prix <= 0) return alert("Dates invalides");

 const res = await fetch("/api/checkout", {
  method:"POST",
  headers:{ "Content-Type":"application/json" },
  body:JSON.stringify({
    nom: nom.value,
    email: email.value,
    bungalow: bungalow.value,
    debut: dDebut,
    fin: dFin,
    prix: prix   // ← MANQUAIT !
  })
});


  const json = await res.json();
  if (json.url) window.location.href = json.url;
  else alert(json.error || "Erreur paiement");
}

// Réservation simple
document.getElementById("resa-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const dDebut = buildDate(anneeDebut.value, moisDebut.value, jourDebut.value);
  const dFin   = buildDate(anneeFin.value, moisFin.value, jourFin.value);

  const data = {
    nom: nom.value,
    email: email.value,
    bungalow: bungalow.value,
    debut: dDebut,
    fin: dFin
  };

  const res = await fetch("/api/reserver", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(data)
  });

  const json = await res.json();

  if (json.error) alert(json.error);
  else alert("Réservation confirmée !");
});

// Pré-remplissage depuis Dispo.html
const params = new URLSearchParams(location.search);
if (params.get("bungalow")) {
  bungalow.value = params.get("bungalow");
}
if (params.get("date")) {
  const d = new Date(params.get("date"));
  anneeDebut.value = d.getFullYear();
  moisDebut.value = d.getMonth();
  remplirJours(jourDebut, moisDebut, anneeDebut);
  jourDebut.value = d.getDate();
  majPrix();
}
  <h1>⚠️ Le site et le systeme de payement sont toujours en construction ⚠️</h1>
</script>
</body>
</html>
