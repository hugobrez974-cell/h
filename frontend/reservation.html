<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réserver – Les tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bois: #5A4633;
      --sable: #F4E9D8;
      --vert: #A7C4A0;
      --blanc: #d6c7a0;
      --texte: #3A2F25;
    }

    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      background: var(--sable);
      color: var(--texte);
      padding: 2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--bois);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .container {
      max-width: 450px;
      margin: auto;
      background: var(--blanc);
      padding: 2rem;
      border-radius: 1rem;
      border: 2px solid var(--bois);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: 600;
      color: var(--bois);
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.4rem;
      border-radius: 0.6rem;
      border: 2px solid var(--bois);
      background: #fff;
      font-size: 1rem;
      color: var(--texte);
    }

    .btn {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.9rem;
      background: var(--vert);
      color: var(--bois);
      border-radius: 999px;
      font-weight: 700;
      font-size: 1.1rem;
      border: 2px solid var(--bois);
      cursor: pointer;
    }

    .btn:hover { filter: brightness(1.05); }

    .error {
      margin-top: 1rem;
      color: red;
      text-align: center;
      display: none;
    }
  </style>
</head>

<body>

<h1>Réserver votre séjour</h1>

<div class="container">

  <label>Bungalow</label>
  <select id="bungalow">
    <option value="bungalow1">Bungalow 1</option>
    <option value="bungalow2">Bungalow 2</option>
  </select>

  <label>Nom complet</label>
  <input type="text" id="name">

  <label>Email</label>
  <input type="email" id="email">

  <label>Date d'arrivée</label>
  <input type="date" id="dateArrivee">

  <label>Date de départ</label>
  <input type="date" id="dateDepart">

  <label>Prix total (€)</label>
  <input type="number" id="price" value="0" readonly>

  <button class="btn" onclick="payer()">Payer</button>

  <div id="error" class="error"></div>
</div>

<script>
// -----------------------------
// 🔥 Pré-remplissage depuis Dispo.html
// -----------------------------
const params = new URLSearchParams(window.location.search);
const bungalow = params.get("bungalow");
const date = params.get("date");

if (bungalow) {
  document.getElementById("bungalow").value = bungalow;
}

if (date) {
  document.getElementById("dateArrivee").value = date;

  const d = new Date(date);
  d.setDate(d.getDate() + 1);
  const iso = d.toISOString().split("T")[0];
  document.getElementById("dateDepart").value = iso;
}

// -----------------------------
// 🔥 Calcul du prix variable
// -----------------------------
function calculerPrix() {
  const d1 = new Date(document.getElementById("dateArrivee").value);
  const d2 = new Date(document.getElementById("dateDepart").value);

  if (isNaN(d1) || isNaN(d2)) return;

  let total = 0;

  for (let d = new Date(d1); d < d2; d.setDate(d.getDate() + 1)) {
    const jour = d.getDay(); // 5 = vendredi, 6 = samedi
    total += (jour === 5 || jour === 6) ? 150 : 130;
  }

  document.getElementById("price").value = total;
}

document.getElementById("dateArrivee").addEventListener("change", calculerPrix);
document.getElementById("dateDepart").addEventListener("change", calculerPrix);

setTimeout(calculerPrix, 200);

// -----------------------------
// 🔥 Paiement Stripe
// -----------------------------
async function payer() {
  const data = {
    bungalow: document.getElementById("bungalow").value,
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    dateArrivee: document.getElementById("dateArrivee").value,
    dateDepart: document.getElementById("dateDepart").value,
    price: parseInt(document.getElementById("price").value)
  };

  if (!data.name || !data.email || !data.dateArrivee || !data.dateDepart) {
    showError("Merci de remplir tous les champs.");
    return;
  }

  if (data.price <= 0) {
    showError("La date de départ doit être après la date d'arrivée.");
    return;
  }

  try {
    const res = await fetch("https://h-e5oa.onrender.com/api/create-checkout-session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const json = await res.json();

    if (!json.url) {
      showError("Erreur lors de la création du paiement.");
      return;
    }

    window.location.href = json.url;

  } catch (e) {
    showError("Impossible de contacter le serveur.");
  }
}

function showError(msg) {
  const box = document.getElementById("error");
  box.textContent = msg;
  box.style.display = "block";
}
</script>

</body>
</html>
