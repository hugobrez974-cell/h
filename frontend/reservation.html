<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réserver</title>
</head>
<body>

<h1>Réservation</h1>

<form id="resaForm">
  <label>Nom :</label>
  <input type="text" id="name" required>

  <label>Email :</label>
  <input type="email" id="email" required>

  <label>Date :</label>
  <input type="date" id="date" required>

  <label>Nuits :</label>
  <input type="number" id="nights" value="1" min="1" required>

  <label>Prix total (€) :</label>
  <input type="number" id="price" value="120" required>

  <button type="submit">Payer</button>
</form>

<script>
document.getElementById("resaForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    date: document.getElementById("date").value,
    nights: document.getElementById("nights").value,
    price: document.getElementById("price").value
  };

  const res = await fetch("https://h-e5oa.onrender.com/create-checkout-session", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const json = await res.json();
  window.location.href = json.url;
});
</script>

</body>
</html>
