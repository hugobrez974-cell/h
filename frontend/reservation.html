<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Réserver – Les Tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bois: #5A4633;
      --sable: #F4E9D8;
      --vert: #A7C4A0;
      --blanc: #d6c7a0;
      --or: #D9B77A;
      --texte: #3A2F25;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--sable);
      color: var(--texte);
      padding: 2rem;
    }

    /* MENU RESPONSIVE */
    header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5d8c8;
      z-index: 10000;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--bois);
    }

    nav.desktop-menu {
      display: flex;
      gap: 1.5rem;
    }

    nav.desktop-menu a {
      text-decoration: none;
      color: var(--bois);
      font-weight: 600;
    }

    nav.desktop-menu a:hover {
      color: var(--vert);
    }

    .burger {
      display: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--bois);
    }

    #mobileMenu {
      position: fixed;
      top: 0;
      right: -500px;
      width: 260px;
      height: 100%;
      background: var(--bois);
      color: var(--sable);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      transition: right 0.35s ease;
      z-index: 99999;
    }

    #mobileMenu.open {
      right: 0;
    }

    #mobileMenu a {
      color: var(--sable);
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 600;
    }

    #mobileMenu a:hover {
      color: var(--vert);
    }

    @media (max-width: 900px) {
      nav.desktop-menu { display: none; }
      .burger { display: block; }
    }

    /* FORMULAIRE */
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      border: 1px solid #d2c1a5;
      margin-top: 2rem;
    }

    label {
      font-weight: 600;
      color: var(--bois);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #b9a58a;
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--vert);
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      color: var(--bois);
    }

    button:hover {
      background: #8fb88f;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Les tonneaux des Ô</div>
  <div class="burger" onclick="toggleMenu()">☰</div>

  <nav class="desktop-menu">
    <a href="/main.html">Accueil</a>
    <a href="/dispo.html">Disponibilités</a>
    <a href="/reservation.html">Réserver</a>
    <a href="/main.html#bungalows">Bungalows</a>
    <a href="/main.html#contact">Contact</a>
  </nav>
</header>

<div id="mobileMenu">
  <a href="/main.html" onclick="toggleMenu()">Accueil</a>
  <a href="/dispo.html" onclick="toggleMenu()">Disponibilités</a>
  <a href="/reservation.html" onclick="toggleMenu()">Réserver</a>
  <a href="/main.html#bungalows" onclick="toggleMenu()">Bungalows</a>
  <a href="/main.html#contact" onclick="toggleMenu()">Contact</a>
  <a href="#" onclick="toggleMenu()">Fermer</a>
</div>

<script>
  function toggleMenu() {
    document.getElementById("mobileMenu").classList.toggle("open");
  }
</script>

<h1 style="text-align:center;color:var(--bois);margin-top:2rem;">Réserver votre séjour</h1>

<div class="container">
  <label>Bungalow :</label>
  <select id="bungalow"></select>

  <label>Date d’arrivée :</label>
  <input type="date" id="dateA">

  <label>Date de départ :</label>
  <input type="date" id="dateD">

  <label>Nom :</label>
  <input type="text" id="name">

  <label>Email :</label>
  <input type="email" id="email">

  <button onclick="reserve()">Réserver</button>
</div>

<!-- REMPLISSAGE AUTOMATIQUE -->
<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("bungalow").innerHTML = `
  <option value="${params.get("bungalow")}">Bungalow ${params.get("bungalow")}</option>
`;

document.getElementById("dateA").value = params.get("dateA");
document.getElementById("dateD").value = params.get("dateD");
</script>

<!-- REDIRECTION DIRECTE VERS LE PAIEMENT -->
<script>
const BASE_URL = "https://h-e5oa.onrender.com";

async function reserve() {
  const params = new URLSearchParams(window.location.search);
  const bungalow = params.get("bungalow");
  const dateA = params.get("dateA");
  const dateD = params.get("dateD");
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  if (!name || !email) {
    alert("Veuillez remplir tous les champs.");
    return;
  }

  // Calcul du prix total
  const prix = calculerPrix(dateA, dateD);

  // Création du lien de paiement via ton API Render
  const res = await fetch(`${BASE_URL}/api/admin/create-payment-link`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      bungalow,
      name,
      email,
      dateArrivee: dateA,
      dateDepart: dateD,
      prix
    })
  });

  const json = await res.json();

  if (json.success && json.url) {
    window.location.href = json.url;
  } else {
    alert("Erreur lors de la création du lien de paiement.");
  }
}
</script>

</body>
</html>
