<html lang="fr">

  <meta charset="UTF-8">
  <title>Réserver – Les Tonneaux des Ô</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

  }
</style>

<div class="nav">
  <a href="main.html">Accueil</a>
  <a href="dispo.html">Disponibilités</a>
  <a href="reservation.html">Réserver</a>
  <a href="main.html">Nos bungalows</a>
  <a href="main.html">Contact</a>
  <a href="admin.html">Admin</a>
</div>

<style>
  body {
    font-family: 'Nunito', sans-serif;
    background: #F4E9D8;
    color: #3A2F25;
    padding: 2rem;
  }
  .box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    border: 2px solid #5A4633;
    max-width: 500px;
    margin: auto;
  }
  input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #b9a58a;
  }
  .btn {
    background: #A7C4A0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }
  .btn:hover {
    background: #8fb48a;
  }
  .result {
    margin-top: 20px;
    font-size: 1.2rem;
    text-align: center;
  }
</style>

<div class="box">
  <h2>Réserver un bungalow</h2>

  <label>Bungalow :</label>
  <select id="bungalow" onchange="updatePrice()">
    <option value="1">Bungalow 1</option>
    <option value="2">Bungalow 2</option>
  </select>

  <label>Nom :</label>
  <input type="text" id="name">

  <label>Email :</label>
  <input type="email" id="email">

  <label>Date d’arrivée :</label>
  <input type="date" id="dateArrivee" onchange="updatePrice()">

  <label>Date de départ :</label>
  <input type="date" id="dateDepart" onchange="updatePrice()">

  <label>Prix total (€) :</label>
  <input type="number" id="price" readonly>

  <button class="btn" onclick="pay()">Payer et réserver</button>

  <div id="result" class="result"></div>
</div>

<script>
const BASE_URL = "https://h-e5oa.onrender.com";

// 🔥 TARIFS
// 130 € du dimanche au jeudi
// 150 € vendredi et samedi
function getNightPrice(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0 = dimanche, 6 = samedi

  if (day === 5 || day === 6) {
    return 150; // vendredi (5) et samedi (6)
  }
  return 130; // dimanche à jeudi
}

// 🔥 Calcul automatique du prix total
function updatePrice() {
  const dateA = document.getElementById("dateArrivee").value;
  const dateD = document.getElementById("dateDepart").value;

  if (!dateA || !dateD) return;

  const d1 = new Date(dateA);
  const d2 = new Date(dateD);

  const nights = (d2 - d1) / (1000 * 60 * 60 * 24);

  if (nights <= 0) {
    document.getElementById("price").value = "";
    return;
  }

  let total = 0;
  let current = new Date(dateA);

  for (let i = 0; i < nights; i++) {
    total += getNightPrice(current);
    current.setDate(current.getDate() + 1);
  }

  document.getElementById("price").value = total;
}

// 🔥 Paiement Stripe
async function pay() {
  const bungalow = document.getElementById("bungalow").value;
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const dateA = document.getElementById("dateArrivee").value;
  const dateD = document.getElementById("dateDepart").value;
  const price = document.getElementById("price").value;

  if (!name || !email || !dateA || !dateD || !price) {
    document.getElementById("result").innerHTML = "❌ Veuillez remplir tous les champs.";
    return;
  }

  // Vérifier disponibilité
  const res = await fetch(`${BASE_URL}/api/reservations`);
  const data = await res.json();

  const overlap = data.some(r =>
    r.bungalow == bungalow &&
    !(dateD <= r.dateArrivee || dateA >= r.dateDepart)
  );

  if (overlap) {
    document.getElementById("result").innerHTML = "❌ Ce bungalow est occupé.";
    return;
  }

  // Lancer Stripe
  const session = await fetch(`${BASE_URL}/api/create-checkout-session`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      bungalow,
      name,
      email,
      dateArrivee: dateA,
      dateDepart: dateD,
      price
    })
  });

  const json = await session.json();

  if (json.url) {
    window.location.href = json.url;
  } else {
    document.getElementById("result").innerHTML = "❌ Erreur lors du paiement.";
  }
}
</script>

</body>
</html>
