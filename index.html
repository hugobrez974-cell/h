<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>F1 Live Interface</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: Arial; overflow: hidden; }

    #bgLogo {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; opacity: 0.08; z-index: 0; pointer-events: none;
    }

    #loadingScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 20;
    }

    #loadingLogo { width: 180px; margin-bottom: 20px; }
    #loadingBar { width: 200px; height: 6px; background: #222; border-radius: 4px; overflow: hidden; }
    #loadingFill { width: 0%; height: 100%; background: red; transition: .3s; }

    #introText {
      position: fixed; top: 50%; right: 50%; transform: translate(50%, -50%);
      text-align: right; font-size: 4rem; opacity: 0; z-index: 5;
      text-shadow: 0 0 20px red; transition: 1s;
    }

    #introText.small {
      top: 1rem; right: 1rem; transform: translate(0,0);
      font-size: 1.8rem; text-shadow: 0 0 10px red;
    }

    #timeDisplay { font-size: 1rem; margin-top: .4rem; opacity: 0; transition: 1s; }

    #resultsBox {
      position: fixed; top: 1rem; left: 1rem; background: rgba(0,0,0,.6);
      padding: 1rem 1.4rem; border-left: 3px solid red; border-radius: 4px;
      font-size: 1rem; line-height: 1.4rem; z-index: 5; display: none;
    }

    #resultsBox .title { color: red; font-weight: bold; margin-bottom: .4rem; }

    #toggleNews {
      position: fixed; bottom: 1rem; left: 1rem;
      background: rgba(255,0,0,0.8); color: #fff; padding: .5rem 1rem;
      border-radius: 4px; cursor: pointer; z-index: 6;
      font-weight: bold; user-select: none; transition: .2s;
    }

    #toggleNews:hover { background: red; transform: scale(1.05); }

    #newsPanel {
      position: fixed; bottom: 3.5rem; left: 1rem;
      width: 420px; height: 260px; background: #111;
      border: 2px solid red; border-radius: 6px;
      overflow: hidden; z-index: 5; display: none;
      resize: both; opacity: 0; transform: translateY(20px);
      transition: .3s ease;
    }

    #newsPanel.show {
      display: block; opacity: 1; transform: translateY(0);
    }

    #newsPanel iframe { width: 100%; height: 100%; border: none; }

    #dragBar {
      position: absolute; top: 0; left: 0; width: 100%; height: 20px;
      background: rgba(255,0,0,0.3); cursor: move; z-index: 10;
    }
  </style>
</head>
<body>

  <img id="bgLogo" src="https://upload.wikimedia.org/wikipedia/commons/3/33/F1.svg">

  <div id="loadingScreen">
    <img id="loadingLogo" src="https://upload.wikimedia.org/wikipedia/commons/3/33/F1.svg">
    <div id="loadingBar"><div id="loadingFill"></div></div>
  </div>

  <div id="introText">
    <div id="hello"></div>
    <div id="timeDisplay"></div>
  </div>

  <div id="resultsBox">
    <div class="title">Résultats</div>
    <div id="resultsList"></div>
  </div>

  <div id="toggleNews">▲ News F1</div>

  <div id="newsPanel">
    <div id="dragBar"></div>
    <iframe src="https://fr.motorsport.com/f1/"></iframe>
  </div>

  <script>
    const loadingFill = document.getElementById("loadingFill");
    const loadingScreen = document.getElementById("loadingScreen");

    let p = 0;
    const loadInterval = setInterval(() => {
      p += 10;
      loadingFill.style.width = p + "%";
      if (p >= 100) {
        clearInterval(loadInterval);
        loadingScreen.style.opacity = "0";
        setTimeout(() => loadingScreen.style.display = "none", 600);
        startIntro();
      }
    }, 200);

    function startIntro() {
      const intro = document.getElementById("introText");
      const hello = document.getElementById("hello");
      const timeDisplay = document.getElementById("timeDisplay");
      hello.textContent = "Bonjour Hugo";

      setTimeout(() => {
        intro.style.opacity = "1";
        setTimeout(() => {
          intro.classList.add("small");
          setTimeout(() => {
            updateTime();
            timeDisplay.style.opacity = "1";
            showInterface();
            startLiveResults();
          }, 600);
        }, 1500);
      }, 300);
    }

    function updateTime() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, "0");
      const m = now.getMinutes().toString().padStart(2, "0");
      document.getElementById("timeDisplay").textContent = `${h}:${m} — Heure locale`;
    }
    setInterval(updateTime, 10000);

    function showInterface() {
      document.getElementById("resultsBox").style.display = "block";
    }

    async function startLiveResults() {
      await updateResults();
      setInterval(updateResults, 5000);
    }

    async function updateResults() {
      const url = "https://ergast.com/api/f1/current/last/results.json";
      const res = await fetch(url);
      const data = await res.json();
      const races = data.MRData.RaceTable.Races;
      if (!races.length) return;

      const results = races[0].Results;
      const list = document.getElementById("resultsList");
      list.innerHTML = "";

      results.forEach(r => {
        const div = document.createElement("div");
        div.textContent = `${r.position}. ${r.Driver.familyName} — ${r.Time ? r.Time.time : r.status}`;
        list.appendChild(div);
      });
    }

    const toggle = document.getElementById("toggleNews");
    const panel = document.getElementById("newsPanel");

    toggle.onclick = () => {
      if (panel.classList.contains("show")) {
        panel.classList.remove("show");
        setTimeout(() => panel.style.display = "none", 300);
        toggle.textContent = "▲ News F1";
      } else {
        panel.style.display = "block";
        setTimeout(() => panel.classList.add("show"), 10);
        toggle.textContent = "▼ News F1";
      }
    };

    const dragBar = document.getElementById("dragBar");
    let offsetX = 0, offsetY = 0, dragging = false;

    dragBar.onmousedown = e => {
      dragging = true;
      offsetX = e.clientX - panel.offsetLeft;
      offsetY = e.clientY - panel.offsetTop;
    };

    document.onmouseup = () => dragging = false;

    document.onmousemove = e => {
      if (!dragging) return;
      panel.style.left = (e.clientX - offsetX) + "px";
      panel.style.top = (e.clientY - offsetY) + "px";
    };
  </script>

</body>
</html>
