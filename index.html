<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>F1 – Live & Interactive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    /* Splash */
    #splash {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1rem;
      z-index: 10;
      transition: opacity 0.8s ease;
    }

    #splash img {
      width: 220px;
      filter: drop-shadow(0 0 15px red);
    }

    #splash span {
      color: #ccc;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    /* Main */
    #main {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      text-align: center;
      padding: 2rem;
      position: relative;
      height: 100vh;
    }

    #main.visible {
      opacity: 1;
      transform: translateY(0);
    }

    h1 {
      margin-top: 1rem;
      font-size: 2rem;
    }

    #liveStatus {
      margin-top: 0.5rem;
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.7rem 1.6rem;
      border-radius: 999px;
      border: 1px solid red;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      background: transparent;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .btn:hover {
      background: red;
      transform: translateY(-1px);
    }

    .username-input {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .username-input input {
      padding: 0.5rem 0.8rem;
      border-radius: 999px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      outline: none;
    }

    .username-input input:focus {
      border-color: red;
    }

    /* F1 au milieu */
    #carContainer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      perspective: 1000px;
    }

    #f1car {
      width: 320px;
      filter: drop-shadow(0 0 20px red);
      transform-style: preserve-3d;
      transition: transform 0.05s linear;
    }
  </style>
</head>
<body>

  <!-- Splash -->
  <div id="splash">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/33/F1.svg" alt="F1 Logo">
    <span>CHARGEMENT DU PADDOCK...</span>
  </div>

  <!-- Main -->
  <div id="main">
    <h1 id="hello">Bonjour pilote</h1>
    <p id="liveStatus">Chargement du statut de la course...</p>
    <div id="liveButton"></div>

    <!-- F1 au milieu -->
    <div id="carContainer">
      <!-- Remplace l’image par ta propre F1 si tu veux -->
      <img id="f1car" src="https://i.imgur.com/8QZQZyC.png" alt="F1 Car">
    </div>

    <!-- Nom utilisateur -->
    <div class="username-input">
      <input type="text" id="username" placeholder="Ton nom">
      <button class="btn" id="saveName">Valider</button>
    </div>
  </div>

  <script>
    // Splash
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        splash.style.opacity = '0';
        setTimeout(() => {
          splash.style.display = 'none';
          document.getElementById('main').classList.add('visible');
        }, 800);
      }, 2000);
    });

    // Username
    const hello = document.getElementById('hello');
    const storedName = localStorage.getItem('f1_username');

    if (storedName) {
      hello.textContent = `Bonjour ${storedName}`;
    }

    document.getElementById('saveName').addEventListener('click', () => {
      const name = document.getElementById('username').value.trim();
      if (name) {
        localStorage.setItem('f1_username', name);
        hello.textContent = `Bonjour ${name}`;
      }
    });

    // Détection course en direct (OpenF1)
    async function checkLiveRace() {
      const statusText = document.getElementById('liveStatus');
      const liveButton = document.getElementById('liveButton');

      try {
        const res = await fetch("https://api.openf1.org/v1/sessions?session_name=Race&session_status=started");
        const data = await res.json();

        if (data.length > 0) {
          statusText.textContent = "Une course est en direct !";
          liveButton.innerHTML = `<a class="btn" href="https://www.formula1.com/en/live" target="_blank">Voir la course en direct</a>`;
        } else {
          statusText.textContent = "Aucune course en direct pour le moment";
          liveButton.innerHTML = "";
        }
      } catch (e) {
        statusText.textContent = "Impossible de vérifier le statut de la course";
        liveButton.innerHTML = "";
      }
    }

    checkLiveRace();

    // F1 qui tourne avec la souris (360°)
    const car = document.getElementById('f1car');

    document.addEventListener('mousemove', (e) => {
      const x = e.clientX;
      const y = e.clientY;
      const w = window.innerWidth;
      const h = window.innerHeight;

      // Angle horizontal 0 → 360
      const angleY = (x / w) * 360;

      // Petit tilt vertical -15° → 15°
      const angleX = ((y / h) - 0.5) * -30;

      car.style.transform = `rotateX(${angleX}deg) rotateY(${angleY}deg)`;
    });
  </script>
</body>
</html>
