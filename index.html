<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>F1 3D – 360°</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Splash */
    #splash {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1rem;
      z-index: 10;
      transition: opacity 0.8s ease;
    }

    #splash img {
      width: 220px;
      filter: drop-shadow(0 0 15px red);
    }

    #splash span {
      color: #ccc;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    /* Demande du nom */
    #namePrompt {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1rem;
      z-index: 9;
    }

    #namePrompt input {
      padding: 0.7rem 1rem;
      border-radius: 999px;
      border: 1px solid red;
      background: #111;
      color: #fff;
      outline: none;
    }

    #namePrompt button {
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      border: 1px solid red;
      background: transparent;
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
    }

    /* Bonjour ... */
    #mainUI {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-size: 1.4rem;
      display: none;
      z-index: 5;
      text-shadow: 0 0 10px red;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

  <!-- Splash -->
  <div id="splash">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/33/F1.svg" alt="F1 Logo">
    <span>CHARGEMENT DU PADDOCK...</span>
  </div>

  <!-- Demande du nom -->
  <div id="namePrompt">
    <h2>Entre ton nom pilote</h2>
    <input type="text" id="username" placeholder="Ton nom">
    <button id="saveName">Valider</button>
  </div>

  <!-- Bonjour ... -->
  <div id="mainUI">
    <span id="hello"></span>
  </div>

  <!-- Three.js depuis CDN (rien à installer) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    /* --- Splash --- */
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        splash.style.opacity = '0';
        setTimeout(() => {
          splash.style.display = 'none';
          checkName();
        }, 800);
      }, 2000);
    });

    /* --- Gestion du nom --- */
    function checkName() {
      const stored = localStorage.getItem('f1_username');
      if (stored) {
        startApp(stored);
      } else {
        document.getElementById('namePrompt').style.display = 'flex';
      }
    }

    document.getElementById('saveName').onclick = () => {
      const name = document.getElementById('username').value.trim();
      if (name) {
        localStorage.setItem('f1_username', name);
        document.getElementById('namePrompt').style.display = 'none';
        startApp(name);
      }
    };

    function startApp(name) {
      document.getElementById('mainUI').style.display = 'block';
      document.getElementById('hello').textContent = `Bonjour ${name}`;
      init3D();
    }

    /* --- 3D F1 --- */
    let scene, camera, renderer, car;

    function init3D() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(
        50,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 1.2, 5);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      const light = new THREE.DirectionalLight(0xffffff, 2);
      light.position.set(5, 10, 5);
      scene.add(light);

      const ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);

      const loader = new THREE.GLTFLoader();

      // Modèle F1 3D en ligne (GLB)
      loader.load(
        "https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/FormulaCar/glTF-Binary/FormulaCar.glb",
        (gltf) => {
          car = gltf.scene;
          car.scale.set(0.9, 0.9, 0.9);
          car.rotation.y = Math.PI; // face caméra
          scene.add(car);
        },
        undefined,
        (err) => {
          console.error("Erreur chargement modèle :", err);
        }
      );

      animate();
    }

    /* --- Rotation 360° avec la souris --- */
    document.addEventListener('mousemove', (e) => {
      if (!car) return;

      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;

      const rotY = (x - 0.5) * Math.PI * 2; // 360°
      const rotX = (y - 0.5) * -0.4;        // tilt léger

      car.rotation.y = rotY;
      car.rotation.x = rotX;
    });

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      if (!camera || !renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

</body>
</html>
