<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>F1 3D Interactive</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Splash */
    #splash {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1rem;
      z-index: 10;
      transition: opacity 0.8s ease;
    }

    #splash img {
      width: 220px;
      filter: drop-shadow(0 0 15px red);
    }

    #splash span {
      color: #ccc;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    /* Popup nom */
    #namePrompt {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1rem;
      z-index: 9;
    }

    #namePrompt input {
      padding: 0.7rem 1rem;
      border-radius: 999px;
      border: 1px solid red;
      background: #111;
      color: #fff;
      outline: none;
      width: 220px;
      text-align: center;
    }

    #namePrompt button {
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      border: 1px solid red;
      background: transparent;
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.2s;
    }

    #namePrompt button:hover {
      background: red;
    }

    /* Bonjour + Heure */
    #introText {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 4rem;
      opacity: 0;
      z-index: 5;
      text-shadow: 0 0 20px red;
      transition: all 1s ease;
    }

    #introText.small {
      top: 1rem;
      left: 1rem;
      transform: translate(0,0);
      font-size: 1.8rem;
      text-align: left;
      text-shadow: 0 0 10px red;
    }

    #timeDisplay {
      font-size: 1rem;
      margin-top: 0.4rem;
      opacity: 0;
      transition: opacity 1s ease;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>

  <!-- Splash -->
  <div id="splash">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/33/F1.svg">
    <span>CHARGEMENT DU PADDOCK...</span>
  </div>

  <!-- Popup nom -->
  <div id="namePrompt">
    <h2>Entre ton nom pilote</h2>
    <input type="text" id="username" placeholder="Ton nom">
    <button id="saveName">Entrer dans le paddock</button>
  </div>

  <!-- Bonjour + Heure -->
  <div id="introText">
    <div id="hello"></div>
    <div id="timeDisplay"></div>
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    /* --- Splash --- */
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        splash.style.opacity = '0';
        setTimeout(() => {
          splash.style.display = 'none';
          checkName();
        }, 800);
      }, 2000);
    });

    /* --- Gestion du nom --- */
    function checkName() {
      const stored = localStorage.getItem('f1_username');
      if (stored) {
        startApp(stored);
      } else {
        document.getElementById('namePrompt').style.display = 'flex';
      }
    }

    document.getElementById('saveName').onclick = () => {
      const name = document.getElementById('username').value.trim();
      if (name) {
        localStorage.setItem('f1_username', name);
        document.getElementById('namePrompt').style.display = 'none';
        startApp(name);
      }
    };

    /* --- Animation Bonjour + Heure --- */
    function startApp(name) {
      const intro = document.getElementById('introText');
      const hello = document.getElementById('hello');
      const timeDisplay = document.getElementById('timeDisplay');

      hello.textContent = `Bonjour ${name}`;

      intro.style.opacity = '1';

      setTimeout(() => {
        intro.classList.add('small');
        setTimeout(() => {
          updateTime();
          timeDisplay.style.opacity = '1';
        }, 600);
      }, 1500);

      init3D();
    }

    function updateTime() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('timeDisplay').textContent = `${h}:${m} — Heure locale`;
    }

    setInterval(updateTime, 10000);

    /* --- 3D F1 --- */
    let scene, camera, renderer, car;
    let zoomed = false;

    function init3D() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(
        50,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 1.2, 5);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      /* Lumières corrigées */
      const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
      keyLight.position.set(3, 5, 4);
      scene.add(keyLight);

      const rimLight = new THREE.DirectionalLight(0xff0000, 1.5);
      rimLight.position.set(-4, 3, -3);
      scene.add(rimLight);

      const ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);

      const loader = new THREE.GLTFLoader();

      loader.load(
        "https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/FormulaCar/glTF-Binary/FormulaCar.glb",
        (gltf) => {
          car = gltf.scene;

          car.scale.set(0.55, 0.55, 0.55);
          car.position.set(0, -0.8, 0);
          car.rotation.y = Math.PI;

          scene.add(car);
        }
      );

      animate();
    }

    /* --- Rotation + Zoom --- */
    document.addEventListener('mousemove', (e) => {
      if (!car || !zoomed) return;

      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;

      car.rotation.y = (x - 0.5) * Math.PI * 2;
      car.rotation.x = (y - 0.5) * -0.4;
    });

    document.addEventListener('click', () => {
      if (!car) return;

      if (!zoomed) {
        car.scale.set(1.2, 1.2, 1.2);
        car.position.set(0, 0, 0);
        camera.position.set(0, 1, 3);
        zoomed = true;
      } else {
        car.scale.set(0.55, 0.55, 0.55);
        car.position.set(0, -0.8, 0);
        camera.position.set(0, 1.2, 5);
        zoomed = false;
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      if (!camera || !renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

</body>
</html>
